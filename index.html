<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>I LOVE YOU MEI</title>

<style>

body{
 margin:0;
 height:100vh;
 overflow:hidden;
 background:linear-gradient(#ffd9ed,#ff4f91);
 display:flex;
 justify-content:center;
 align-items:center;
 perspective:1000px;
 font-family:Arial,sans-serif;
}


.center{

 position:absolute;
 z-index:10;

 color:white;
 font-size:42px;
 font-weight:bold;

 text-shadow:
 0 0 15px #ff0077,
 0 0 30px white;

 animation:pulse 2s infinite;

}


@keyframes pulse{

50%{
 transform:scale(1.15);
}

}



.heart{

 width:500px;
 height:500px;

 position:relative;

 transform-style:preserve-3d;

 animation:spin 12s linear infinite;

}



@keyframes spin{

from{
 transform:rotateY(0deg);
}

to{
 transform:rotateY(360deg);
}

}



.word{

 position:absolute;

 color:white;

 font-size:18px;

 font-weight:bold;

 white-space:nowrap;


 text-shadow:
 0 0 10px #ff0080;


 animation:move 2s infinite alternate;

}



@keyframes move{

from{
 margin-top:0;
}

to{
 margin-top:12px;
}

}



</style>

</head>


<body>


<div class="center">
I LOVE YOU MEI
</div>


<div class="heart" id="heart"></div>



<script>


// =====================
// สร้างหัวใจจากข้อความ
// =====================


const heart =
document.getElementById("heart");


let text="I LOVE YOU MEI";


for(
let t=0;
t<Math.PI*2;
t+=0.12
){


let x =
16*Math.pow(Math.sin(t),3);


let y =
13*Math.cos(t)
-5*Math.cos(2*t)
-2*Math.cos(3*t)
-Math.cos(4*t);



let word =
document.createElement("div");


word.className="word";


word.innerText=text;



word.style.left =
250 + x*12 +"px";


word.style.top =
250 - y*12 +"px";



word.style.transform =
"translateZ("+Math.sin(t)*80+"px)";



heart.appendChild(word);


}



// =====================
// Music Box น่ารัก
// =====================


const AudioContext =
window.AudioContext ||
window.webkitAudioContext;


const audio =
new AudioContext();



function playNote(freq){


let osc =
audio.createOscillator();


let gain =
audio.createGain();



osc.type="sine";


osc.frequency.value=freq;



gain.gain.value=0.12;



osc.connect(gain);

gain.connect(audio.destination);



osc.start();



gain.gain.exponentialRampToValueAtTime(
0.001,
audio.currentTime+1
);



osc.stop(
audio.currentTime+1
);


}



let melody=[

523,659,784,1046,
880,784,659,
523,587,698,
784,659,523

];


let i=0;


function music(){


setInterval(()=>{


playNote(
melody[i%melody.length]
);


i++;


},500);


}



document.body.addEventListener(
"click",
()=>{


audio.resume();


music();


},
{once:true}
);



</script>


</body>
</html>
