<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>I LOVE YOU MEI 💖</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background: radial-gradient(circle, #ffd6f0, #ff4d88);
  font-family: Arial;
}

.text{
  position:absolute;
  color:white;
  font-weight:bold;
  text-shadow:0 0 10px #ff4da6;
  animation: floatUp linear infinite;
  white-space:nowrap;
}

@keyframes floatUp{
  0%{transform:translateY(100vh); opacity:0;}
  10%{opacity:1;}
  100%{transform:translateY(-20vh); opacity:0;}
}

.center{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  color:white;
  font-size:45px;
  text-shadow:0 0 20px #ff69b4;
  animation:pulse 1s infinite;
}

@keyframes pulse{
  0%{transform:translate(-50%,-50%) scale(1);}
  50%{transform:translate(-50%,-50%) scale(1.15);}
  100%{transform:translate(-50%,-50%) scale(1);}
}
</style>
</head>

<body>

<div class="center">💖 I LOVE YOU MEI 💖</div>

<script>
// ---------- TEXT ----------
function spawn(){
  const t = document.createElement("div");
  t.className="text";

  const msg = [
    "I LOVE YOU MEI 💖",
    "MEI CUTE 🫶",
    "LOVE LOVE 💕",
    "MY MEI 💗",
    "FOREVER 💞",
    "BOOM LOVE 💖"
  ];

  t.innerText = msg[Math.floor(Math.random()*msg.length)];

  t.style.left = Math.random()*100 + "vw";
  t.style.fontSize = (14 + Math.random()*28) + "px";
  t.style.animationDuration = (3 + Math.random()*4) + "s";

  document.body.appendChild(t);
  setTimeout(()=>t.remove(),7000);
}

setInterval(spawn,120);

// ---------- MUMU KAWAII MUSIC ----------
const AudioContext = window.AudioContext || window.webkitAudioContext;
const audio = new AudioContext();

function play(freq, time, type="triangle", vol=0.05){
  const o = audio.createOscillator();
  const g = audio.createGain();

  o.type = type;
  o.frequency.value = freq;

  g.gain.value = vol;

  o.connect(g);
  g.connect(audio.destination);

  o.start();
  o.stop(audio.currentTime + time);
}

// 💖 kawaii melody (สดใสกว่าเดิม)
const melody = [
  523, 659, 784, 880, 784, 659,
  698, 784, 659, 523,
  587, 659, 784, 659,
  523, 392
];

// ✨ bell sparkle layer
const sparkle = [1046, 1175, 1318];

function startMusic(){
  let i = 0;

  setInterval(()=>{
    // main melody
    play(melody[i % melody.length], 0.2, "triangle", 0.04);

    // random cute sparkle (เหมือนเสียงกริ๊ง)
    if(Math.random() > 0.6){
      play(sparkle[Math.floor(Math.random()*sparkle.length)], 0.1, "sine", 0.02);
    }

    i++;
  }, 220);
}

document.body.addEventListener("click", ()=>{
  audio.resume();
  startMusic();
}, {once:true});

</script>

</body>
</html>
