<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>I Love You Tan 💗</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    overflow:hidden;
    font-family:'Poppins',sans-serif;
}

canvas{
    position:fixed;
    inset:0;
    z-index:1;
}

.center{

    position:absolute;

    top:50%;
    left:50%;

    transform:translate(-50%,-50%);

    text-align:center;

    z-index:10;

    color:white;

}

#line1{

    font-size:32px;

    font-weight:700;

    letter-spacing:1px;

    text-shadow:
    0 0 10px #ff69b4,
    0 0 25px #ff69b4;

}

#line2{

    margin-top:10px;

    font-size:28px;

    font-weight:600;

    text-shadow:
    0 0 10px #ff69b4,
    0 0 25px #ff69b4;

}

.heart{

    display:inline-block;

    color:#ff69b4;

    animation:heart .8s infinite;

}

@keyframes heart{

0%,100%{

transform:scale(1);

}

50%{

transform:scale(1.4);

}

}.petal{
    position:fixed;
    top:-30px;
    color:#ffb7d5;
    font-size:18px;
    pointer-events:none;
    z-index:5;
    animation:fall linear forwards;
}

@keyframes fall{

    from{
        transform:translateY(-30px) rotate(0deg);
        opacity:1;
    }

    to{
        transform:translateY(110vh) rotate(360deg);
        opacity:.2;
    }

}

</style>

</head>

<body>

<canvas id="matrix"></canvas>

<div class="center">

<div id="line1"></div>

<div id="line2">

<span id="name"></span>

<span class="heart">ᡣ𐭩</span>

</div>

</div>

<script>

const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

function resize() {
    canvas.width = innerWidth;
    canvas.height = innerHeight;
}

resize();

const words = [];
const gap = 170;

function createWords() {

    words.length = 0;

    for (let x = 40; x < canvas.width; x += gap) {

        words.push({

            x: x,

            y: Math.random() * -800,

            speed: 0.8 + Math.random() * 0.8

        });

    }

}

createWords();

function matrix() {

    ctx.fillStyle = "rgba(0,0,0,.18)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.font = "17px monospace";

    ctx.fillStyle = "#ff69b4";

    ctx.shadowColor = "#ff69b4";

    ctx.shadowBlur = 12;

    words.forEach(w=>{

        for(let i=0;i<10;i++){

            ctx.fillText(

                "I LOVE YOU",

                w.x,

                w.y-i*42

            );

        }

        w.y+=w.speed;

        if(w.y>canvas.height+500){

            w.y=-500;

            w.x=Math.random()*canvas.width;

        }

    });

}

setInterval(matrix,30);

window.addEventListener("resize",()=>{

    resize();

    createWords();

});const line1 = document.getElementById("line1");
const name = document.getElementById("name");

const text1 = "I love you";
const text2 = "tan";

let i = 0;
let j = 0;

function typeLine1(){

    if(i < text1.length){

        line1.textContent += text1.charAt(i);

        i++;

        setTimeout(typeLine1,120);

    }else{

        setTimeout(typeLine2,300);

    }

}

function typeLine2(){

    if(j < text2.length){

        name.textContent += text2.charAt(j);

        j++;

        setTimeout(typeLine2,140);

    }

}

setTimeout(typeLine1,700);
function createPetal(){

    const petal = document.createElement("div");

    petal.className = "petal";

    petal.textContent = "🌸";

    petal.style.left = Math.random()*100 + "vw";

    petal.style.animationDuration =
        (8 + Math.random()*5) + "s";

    petal.style.fontSize =
        (14 + Math.random()*8) + "px";

    document.body.appendChild(petal);

    setTimeout(()=>{
        petal.remove();
    },13000);

}

setInterval(createPetal,1800);
setInterval(createPetal,1800);

document.addEventListener("click",(e)=>{

const heart=document.createElement("div");

heart.className="float-heart";

heart.textContent="💗";

heart.style.left=e.clientX+"px";

heart.style.top=e.clientY+"px";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},2000);

});

</script>    
</script>

</body>
</html>
