<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>I LOVE YOU MEI</title>

<style>

body{
 margin:0;
 height:100vh;
 overflow:hidden;
 background:#14000c;
 display:flex;
 justify-content:center;
 align-items:center;
 perspective:1000px;
 font-family:monospace;
}


/* ข้อความตกลงมา */

.rain{

 position:absolute;
 top:-100px;

 color:#ff66bb;

 font-size:20px;
 font-weight:bold;

 text-shadow:
 0 0 10px #ff0088;

 white-space:nowrap;

 animation:fall linear infinite;

}


@keyframes fall{

from{
 transform:translateY(-100px);
}

to{
 transform:translateY(110vh);
 opacity:0;
}

}



/* ข้อความกลาง */

.title{

 position:absolute;

 z-index:10;

 color:white;

 font-size:42px;

 font-weight:bold;

 text-shadow:
 0 0 20px #ff0088;

 animation:pulse 2s infinite;

}


@keyframes pulse{

50%{
 transform:scale(1.15);
}

}



/* กล่องหัวใจ */

.lift{

 width:500px;

 height:500px;

 position:relative;

 transform-style:preserve-3d;


 /* ขึ้นลงแบบลิฟท์ */

 animation:lift 5s ease-in-out infinite;

}



@keyframes lift{

0%{

 transform:
 translateY(-50px)
 rotateX(15deg);

}


50%{

 transform:
 translateY(50px)
 rotateX(-15deg);

}


100%{

 transform:
 translateY(-50px)
 rotateX(15deg);

}

}




.word{

 position:absolute;

 color:white;

 font-size:18px;

 font-weight:bold;

 white-space:nowrap;


 text-shadow:

 0 0 15px #ff0088;


}





</style>

</head>



<body>



<div class="title">
I LOVE YOU MEI
</div>



<div class="lift" id="heart"></div>



<script>


// =====================
// LOVE MATRIX RAIN
// =====================


function createRain(){


 let r=document.createElement("div");


 r.className="rain";


 r.innerText="I LOVE YOU MEI";



 r.style.left=
 Math.random()*100+"vw";



 r.style.animationDuration=
 (3+Math.random()*5)+"s";



 r.style.fontSize=
 (15+Math.random()*25)+"px";



 document.body.appendChild(r);



 setTimeout(()=>{

 r.remove();

 },8000);



}



setInterval(createRain,120);





// =====================
// HEART MADE FROM WORDS
// =====================


const heart=
document.getElementById("heart");


let text=
"I LOVE YOU MEI";



for(
let t=0;
t<Math.PI*2;
t+=0.15
){


let x=
16*Math.pow(Math.sin(t),3);



let y=

13*Math.cos(t)
-5*Math.cos(2*t)
-2*Math.cos(3*t)
-Math.cos(4*t);



let w=
document.createElement("div");


w.className="word";


w.innerText=text;



w.style.left=
250+x*12+"px";



w.style.top=
250-y*12+"px";



// ทำให้มีความลึก

w.style.transform=
"translateZ("+
(Math.sin(t)*100)
+"px)";



heart.appendChild(w);



}





// =====================
// CUTE MUSIC BOX
// =====================


const AudioContext =
window.AudioContext ||
window.webkitAudioContext;


const audio =
new AudioContext();



function playNote(freq){


let osc=
audio.createOscillator();


let gain=
audio.createGain();



osc.type="sine";


osc.frequency.value=freq;



gain.gain.value=0.12;



osc.connect(gain);

gain.connect(audio.destination);



osc.start();



gain.gain.exponentialRampToValueAtTime(

0.001,

audio.currentTime+1

);



osc.stop(
audio.currentTime+1
);


}




let melody=[

523,659,784,

1046,784,659,

587,698,784,

880,784,659

];



let i=0;



function startMusic(){


setInterval(()=>{


playNote(
melody[i%melody.length]
);


i++;


},500);


}




document.body.addEventListener(
"click",
()=>{


audio.resume();


startMusic();


},
{once:true}
);



</script>


</body>
</html>
