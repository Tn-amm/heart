<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>I LOVE YOU MEI 💖</title>
<style>
body{
  margin:0;
  height:100vh;
  overflow:hidden;
  background: radial-gradient(circle, #ffb6d5, #ff3c7d);
  display:flex;
  justify-content:center;
  align-items:center;
  font-family: Arial, sans-serif;
}

h1{
  position:absolute;
  color:white;
  text-shadow:0 0 20px #ff0066;
  font-size:40px;
  z-index:10;
  animation: pulse 1s infinite;
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.2);}
  100%{transform:scale(1);}
}

.heart {
  position:absolute;
  color:#ff004f;
  font-size:16px;
  animation: fall linear infinite;
}

@keyframes fall{
  0%{
    transform:translateY(-10vh) translateX(0);
    opacity:1;
  }
  100%{
    transform:translateY(110vh) translateX(50px);
    opacity:0;
  }
}

canvas{
  position:absolute;
}
</style>
</head>
<body>

<h1>I LOVE YOU MEI 💖</h1>
<canvas id="heartCanvas"></canvas>

<script>
// ---------- HEART RAIN ----------
function createHeart(){
  const heart = document.createElement("div");
  heart.className = "heart";
  heart.innerText = "❤";

  heart.style.left = Math.random()*100 + "vw";
  heart.style.animationDuration = (2 + Math.random()*3) + "s";
  heart.style.fontSize = (10 + Math.random()*20) + "px";

  document.body.appendChild(heart);

  setTimeout(()=>heart.remove(), 5000);
}
setInterval(createHeart, 150);

// ---------- HEART SHAPE (TikTok style) ----------
const canvas = document.getElementById("heartCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

function drawHeart(x, y, size){
  ctx.beginPath();
  for(let t=0; t<Math.PI*2; t+=0.01){
    let hx = 16*Math.sin(t)**3;
    let hy = 13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t);
    ctx.lineTo(x + hx*size, y - hy*size);
  }
  ctx.fillStyle = "rgba(255,0,80,0.15)";
  ctx.fill();
}

setInterval(()=>{
  ctx.clearRect(0,0,canvas.width,canvas.height);
  for(let i=0;i<8;i++){
    drawHeart(
      canvas.width/2,
      canvas.height/2,
      8 + Math.sin(Date.now()/500)*2
    );
  }
},30);

// ---------- SIMPLE ROYALTY-FREE MUSIC (Web Audio API) ----------
const AudioContext = window.AudioContext || window.webkitAudioContext;
const audioCtx = new AudioContext();

function playTone(freq, time){
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.type = "sine";
  osc.frequency.value = freq;

  gain.gain.value = 0.05;

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();
  osc.stop(audioCtx.currentTime + time);
}

// loop melody
function playMusic(){
  let notes = [523, 659, 784, 659, 523, 440, 523];
  let i = 0;

  setInterval(()=>{
    playTone(notes[i % notes.length], 0.3);
    i++;
  }, 350);
}

document.body.addEventListener("click", ()=>{
  audioCtx.resume();
  playMusic();
}, {once:true});

</script>

</body>
</html>
