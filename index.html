<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>I LOVE YOU MEI 💖</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background: radial-gradient(circle, #ffd1e8, #ff4d88);
  font-family: Arial;
}

/* floating text everywhere */
.text{
  position:absolute;
  color:white;
  font-weight:bold;
  text-shadow:0 0 10px #ff0066;
  animation: floatUp linear infinite;
  white-space:nowrap;
}

@keyframes floatUp{
  0%{
    transform: translateY(100vh) scale(0.8);
    opacity:0;
  }
  10%{opacity:1;}
  100%{
    transform: translateY(-20vh) scale(1.2);
    opacity:0;
  }
}

/* center glow */
.center{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  color:white;
  font-size:45px;
  text-align:center;
  text-shadow:0 0 20px #ff0077;
  animation:pulse 1s infinite;
  z-index:10;
}

@keyframes pulse{
  0%{transform:translate(-50%,-50%) scale(1);}
  50%{transform:translate(-50%,-50%) scale(1.2);}
  100%{transform:translate(-50%,-50%) scale(1);}
}

canvas{
  position:absolute;
}
</style>
</head>

<body>

<div class="center">💖 I LOVE YOU MEI 💖</div>
<canvas id="c"></canvas>

<script>

// ---------- TEXT OVERLOAD ----------
function spawnText(){
  const t = document.createElement("div");
  t.className = "text";

  const messages = [
    "I LOVE YOU MEI 💖",
    "MEI 💕",
    "YOU ARE MY WORLD 🌸",
    "LOVE YOUUU 💗",
    "MEI IS CUTE 🫶",
    "FOREVER YOU 💞"
  ];

  t.innerText = messages[Math.floor(Math.random()*messages.length)];

  t.style.left = Math.random()*100 + "vw";
  t.style.fontSize = (14 + Math.random()*26) + "px";
  t.style.animationDuration = (3 + Math.random()*5) + "s";

  document.body.appendChild(t);

  setTimeout(()=>t.remove(), 8000);
}

setInterval(spawnText, 120);

// ---------- HEART BACKGROUND ----------
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

function heart(x,y,s){
  ctx.beginPath();
  for(let i=0;i<Math.PI*2;i+=0.02){
    let hx = 16*Math.sin(i)**3;
    let hy = 13*Math.cos(i)-5*Math.cos(2*i)-2*Math.cos(3*i)-Math.cos(4*i);
    ctx.lineTo(x+hx*s,y-hy*s);
  }
  ctx.fillStyle="rgba(255,0,100,0.15)";
  ctx.fill();
}

setInterval(()=>{
  ctx.clearRect(0,0,canvas.width,canvas.height);
  for(let i=0;i<10;i++){
    heart(
      canvas.width/2 + Math.sin(Date.now()/1000)*20,
      canvas.height/2,
      10
    );
  }
},30);

// ---------- CUTER MUSIC (KAWAII STYLE) ----------
const AudioContext = window.AudioContext || window.webkitAudioContext;
const audio = new AudioContext();

function note(freq,time){
  const o = audio.createOscillator();
  const g = audio.createGain();

  o.type = "triangle"; // softer kawaii sound 💗
  o.frequency.value = freq;

  g.gain.value = 0.04;

  o.connect(g);
  g.connect(audio.destination);

  o.start();
  o.stop(audio.currentTime + time);
}

function music(){
  const melody = [
    523, 659, 784, 659,
    698, 659, 523, 440,
    523, 587, 659, 784
  ];

  let i = 0;
  setInterval(()=>{
    note(melody[i % melody.length], 0.25);
    i++;
  }, 260);
}

document.body.addEventListener("click", ()=>{
  audio.resume();
  music();
}, {once:true});

</script>

</body>
</html>
