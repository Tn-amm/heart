<!DOCTYPE html>
<html>
<head>
<title>I LOVE YOU MEI</title>

<style>
body{
 margin:0;
 height:100vh;
 overflow:hidden;
 background:linear-gradient(#ffe6f2,#ff8fc3);
 display:flex;
 justify-content:center;
 align-items:center;
 perspective:1000px;
 font-family:sans-serif;
}

.heart{
 position:relative;
 width:500px;
 height:500px;
 transform-style:preserve-3d;
 animation:spin 10s linear infinite;
}

.word{
 position:absolute;
 color:white;
 font-size:20px;
 font-weight:bold;
 text-shadow:0 0 15px #ff2f88;
 transform-style:preserve-3d;
}

@keyframes spin{
 from{
  transform:rotateY(0deg) rotateX(10deg);
 }
 to{
  transform:rotateY(360deg) rotateX(10deg);
 }
}

.title{
 position:absolute;
 color:white;
 font-size:45px;
 font-weight:bold;
 text-shadow:0 0 25px #ff0077;
 animation:pulse 2s infinite;
 z-index:5;
}

@keyframes pulse{
 50%{
  transform:scale(1.15);
 }
}

</style>
</head>

<body>

<div class="title">
I LOVE YOU MEI
</div>

<div class="heart" id="heart"></div>


<script>

const heart = document.getElementById("heart");

let text="I LOVE YOU MEI";

let points=[];


// สร้างรูปหัวใจ
for(let t=0;t<Math.PI*2;t+=0.12){

 let x=16*Math.pow(Math.sin(t),3);

 let y=
 13*Math.cos(t)
 -5*Math.cos(2*t)
 -2*Math.cos(3*t)
 -Math.cos(4*t);


 points.push({
  x:x*15,
  y:-y*15
 });

}


// เติมข้อความรอบหัวใจ
points.forEach((p,i)=>{

 let div=document.createElement("div");

 div.className="word";

 div.innerHTML=text;

 let z=Math.sin(i)*80;


 div.style.left=
 (250+p.x)+"px";

 div.style.top=
 (250+p.y)+"px";


 div.style.transform=
 `translateZ(${z}px)`;

 div.style.animation=
 `float${i} 3s infinite alternate`;

 heart.appendChild(div);


 let style=document.createElement("style");

 style.innerHTML=`

 @keyframes float${i}{
  from{
   margin-top:0px;
  }
  to{
   margin-top:10px;
  }
 }

 `;

 document.head.appendChild(style);

});




// =================
// KANON STYLE MUSIC BOX
// =================

const AudioContext =
window.AudioContext ||
window.webkitAudioContext;

const ctx=new AudioContext();


function playNote(freq){

 let osc=ctx.createOscillator();
 let gain=ctx.createGain();


 osc.type="sine";

 osc.frequency.value=freq;


 gain.gain.value=0.08;


 osc.connect(gain);
 gain.connect(ctx.destination);


 osc.start();

 gain.gain.exponentialRampToValueAtTime(
 0.001,
 ctx.currentTime+1
 );


 osc.stop(ctx.currentTime+1);

}


// music box melody inspired
let melody=[
659,784,880,784,
659,587,523,
587,659,784,
880,784,659,
523,587,659
];


let i=0;


function music(){

 setInterval(()=>{

  playNote(
   melody[i%melody.length]
  );

  i++;

 },500);

}



document.body.onclick=()=>{

 ctx.resume();

 music();

};


</script>

</body>
</html>
