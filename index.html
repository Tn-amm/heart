<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>I Love You Tan ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    overflow:hidden;
    font-family:'Poppins',sans-serif;
}
canvas{
    position:fixed;
    inset:0;
    z-index:1;
}

.center{
    z-index:10;
}
.center{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    display:flex;
    align-items:center;
    gap:8px;
    font-size:28px;
    font-weight:600;
    color:#fff;
    text-shadow:
    0 0 10px #ff69b4,
    0 0 20px #ff69b4;
}

.heart{
    color:#ff69b4;
    display:inline-block;
    animation:bounce .8s infinite;
}

@keyframes bounce{
    0%,100%{
        transform:scale(1);
    }
    50%{
        transform:scale(1.35);
    }
}

</style>

</head>

<body>

<div class="center">
    <span>I love you tan</span>
    <span class="heart">ᡣ𐭩</span>
</div>
<canvas id="matrix"></canvas>

<script>
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();

const streams = [];

function createStreams(){
    streams.length = 0;

    for(let x = 0; x < canvas.width; x += 180){
        streams.push({
            x,
            y: Math.random() * -800,
            speed: 1 + Math.random()
        });
    }
}

createStreams();

function draw(){

    ctx.fillStyle = "rgba(0,0,0,.15)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.font = "16px monospace";
    ctx.fillStyle = "#ff69b4";
    ctx.shadowColor = "#ff69b4";
    ctx.shadowBlur = 8;

    streams.forEach(stream=>{

        for(let i=0;i<12;i++){

            ctx.fillText(
                "I LOVE YOU",
                stream.x,
                stream.y - i*35
            );

        }

        stream.y += stream.speed;

        if(stream.y > canvas.height + 450){

            stream.y = -450;
            stream.x = Math.random() * canvas.width;

        }

    });

}

setInterval(draw,30);

window.addEventListener("resize",()=>{
    resize();
    createStreams();
});
</script>
</body>
</html>
