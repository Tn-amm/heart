<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>I Love You Tan 💗</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    overflow:hidden;
    font-family:'Poppins',sans-serif;
}

canvas{
    position:fixed;
    inset:0;
    z-index:1;
}

.center{

    position:absolute;

    top:50%;
    left:50%;

    transform:translate(-50%,-50%);

    text-align:center;

    z-index:10;

    color:white;

}

#line1{

    font-size:32px;

    font-weight:700;

    letter-spacing:1px;

    text-shadow:
    0 0 10px #ff69b4,
    0 0 25px #ff69b4;

}

#line2{

    margin-top:10px;

    font-size:28px;

    font-weight:600;

    text-shadow:
    0 0 10px #ff69b4,
    0 0 25px #ff69b4;

}

.heart{

    display:inline-block;

    color:#ff69b4;

    animation:heart .8s infinite;

}

@keyframes heart{

0%,100%{

transform:scale(1);

}

50%{

transform:scale(1.4);

}

}

</style>

</head>

<body>

<canvas id="matrix"></canvas>

<div class="center">

<div id="line1"></div>

<div id="line2">

<span id="name"></span>

<span class="heart">ᡣ𐭩</span>

</div>

</div>

<script>

const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

function resize() {
    canvas.width = innerWidth;
    canvas.height = innerHeight;
}

resize();

const words = [];
const gap = 170;

function createWords() {

    words.length = 0;

    for (let x = 40; x < canvas.width; x += gap) {

        words.push({

            x: x,

            y: Math.random() * -800,

            speed: 0.8 + Math.random() * 0.8

        });

    }

}

createWords();

function matrix() {

    ctx.fillStyle = "rgba(0,0,0,.18)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.font = "17px monospace";

    ctx.fillStyle = "#ff69b4";

    ctx.shadowColor = "#ff69b4";

    ctx.shadowBlur = 12;

    words.forEach(w=>{

        for(let i=0;i<10;i++){

            ctx.fillText(

                "I LOVE YOU",

                w.x,

                w.y-i*42

            );

        }

        w.y+=w.speed;

        if(w.y>canvas.height+500){

            w.y=-500;

            w.x=Math.random()*canvas.width;

        }

    });

}

setInterval(matrix,30);

window.addEventListener("resize",()=>{

    resize();

    createWords();

});

</script>

</body>
</html>
